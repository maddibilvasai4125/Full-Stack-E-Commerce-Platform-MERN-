version: '3.9'

# ============================================================
# BREW-N-FILL® | Full-Stack E-Commerce Platform (MERN)
# Docker Compose — Full Service Orchestration
# ============================================================
# Usage:
#   docker-compose up --build -d   (start all services)
#   docker-compose ps               (check status)
#   docker-compose logs -f api      (stream API logs)
#   docker-compose down             (stop all)
# ============================================================

services:

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: brewnfill_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - brewnfill_network
    restart: unless-stopped

  # ─── Node.js / Express API ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brewnfill_api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/brew-n-fill
      - FLASK_SERVICE_URL=http://flask:5000
      - WATSON_API_KEY=${WATSON_API_KEY}
      - WATSON_SERVICE_URL=${WATSON_SERVICE_URL}
      - WATSON_ASSISTANT_ID=${WATSON_ASSISTANT_ID}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - BUSINESS_PHONE_NUMBER=${BUSINESS_PHONE_NUMBER}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
      - flask
    networks:
      - brewnfill_network
    volumes:
      - ./product.json:/app/product.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Flask Python ML Microservice ────────────────────────
  flask:
    build:
      context: ./flask_service
      dockerfile: Dockerfile
    container_name: brewnfill_flask
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
    networks:
      - brewnfill_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MongoDB Database ─────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: brewnfill_mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=brew-n-fill
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - brewnfill_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

# ─── Volumes ──────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────
networks:
  brewnfill_network:
    driver: bridge
